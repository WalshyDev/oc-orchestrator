appId: dev.opencode.orchestrator
productName: OC Orchestrator
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.*,*.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
icon: resources/icon.icns
extraResources:
  - from: resources/icon.png
    to: icon.png
mac:
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
